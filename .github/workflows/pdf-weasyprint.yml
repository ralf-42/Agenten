name: Generate PDF with WeasyPrint

on:
  workflow_dispatch:  # Manueller Start über GitHub UI

jobs:
  build-pdf:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install WeasyPrint system dependencies
        # Source: https://doc.courtbouillon.org/weasyprint/stable/first_steps.html
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libpango-1.0-0 \
            libharfbuzz0b \
            libpangoft2-1.0-0 \
            libharfbuzz-subset0

      - name: Install Python dependencies
        run: pip install weasyprint PyPDF2 requests

      - name: Generate PDF from all sitemap pages
        run: |
          python << 'EOF'
          import requests
          import xml.etree.ElementTree as ET
          from weasyprint import HTML
          from PyPDF2 import PdfMerger
          import os
          import re

          SITEMAP_URL = "https://ralf-42.github.io/Agenten/sitemap.xml"
          OUTPUT_DIR = "pdf_parts"
          FINAL_PDF = "output.pdf"

          # Seiten die ausgeschlossen werden sollen
          EXCLUDE_PATTERNS = [
              r'/legal/',      # Impressum, Datenschutz etc.
              r'/test-',       # Test-Seiten
          ]

          def should_exclude(url):
              return any(re.search(pattern, url) for pattern in EXCLUDE_PATTERNS)

          # Sitemap laden
          print(f"Lade Sitemap: {SITEMAP_URL}")
          response = requests.get(SITEMAP_URL)
          response.raise_for_status()

          # URLs extrahieren
          root = ET.fromstring(response.content)
          namespace = {'ns': 'http://www.sitemaps.org/schemas/sitemap/0.9'}
          urls = [loc.text for loc in root.findall('.//ns:loc', namespace)]

          # Filtern
          urls = [url for url in urls if not should_exclude(url)]
          print(f"Gefunden: {len(urls)} Seiten")

          # Verzeichnis erstellen
          os.makedirs(OUTPUT_DIR, exist_ok=True)

          # Einzelne PDFs erstellen
          pdf_files = []
          for i, url in enumerate(urls):
              print(f"[{i+1}/{len(urls)}] Konvertiere: {url}")
              try:
                  pdf_path = f"{OUTPUT_DIR}/page_{i:03d}.pdf"
                  HTML(url).write_pdf(pdf_path)
                  pdf_files.append(pdf_path)
              except Exception as e:
                  print(f"  Fehler: {e}")

          # PDFs zusammenführen
          print(f"Führe {len(pdf_files)} PDFs zusammen...")
          merger = PdfMerger()
          for pdf in sorted(pdf_files):
              merger.append(pdf)
          merger.write(FINAL_PDF)
          merger.close()

          print(f"Fertig: {FINAL_PDF}")
          EOF

      - name: Upload PDF artifact
        uses: actions/upload-artifact@v4
        with:
          name: agenten-dokumentation
          path: output.pdf
