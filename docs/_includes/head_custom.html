<!-- Mermaid Diagramm Support -->
<script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
<script>
  mermaid.initialize({
    startOnLoad: true,
    theme: 'default',
    securityLevel: 'loose',
    flowchart: {
      htmlLabels: true,
      curve: 'basis'
    }
  });
</script>

<!-- Auto-expand Navigation -->
<script>
  document.addEventListener('DOMContentLoaded', function() {
    // Warte kurz, bis die Navigation geladen ist
    setTimeout(function() {
      // Finde alle zusammengeklappten Navigation-Items
      const navItems = document.querySelectorAll('.nav-list-item.collapsed');

      // Klicke auf jeden Toggle-Button, um die Navigation aufzuklappen
      navItems.forEach(function(item) {
        const button = item.querySelector('button.nav-list-expander');
        if (button) {
          button.click();
        }
      });
    }, 100);
  });
</script>
